<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>选择位置 - 百度地图</title>
    <style>
        *{margin:0;padding:0}
        #map-container{
            position:relative;          /* 作为中心图标的定位参照 */
			width: 100%;
            height:700px;
            /* 宽度由 URL 参数或默认 375px 控制 */
        }
        #map{
           width:100%;
            height:100%;
        }
        /* 固定在视口中心的图标 */
        .center-marker{
            position:absolute;
            top:50%;
            left:50%;
            transform:translate(-50%,-50%);
            width:25px;
            height:25px;
            background:url(https://tranalioss.shanyitong.com/tongyipingtai/images/app-static/static/address-select-icon.png) no-repeat center/contain;
            z-index:100;
            pointer-events:none;        /* 不遮挡地图交互 */
        }
    </style>

    <!-- 百度 API（1.0 类型，带鼠标绘制工具，版本可换） -->
    <script type="text/javascript" src="https://api.map.baidu.com/api?v=1.0&type=webgl&ak=F6gZT3IYPeQylEgrKr8h6Lq0cWwIP1co"></script>
    <!-- 与外层通信的 uni webview SDK -->
    <script src="./static/uni.webview.1.5.6.js"></script>
</head>

<body>
<div id="map-container">
    <div id="map" style="width:300rpx;height: 300rpx;"></div>
    <div class="center-marker"></div>
</div>

<script>
    let map;
    let isPost = 'yes';          // 控制是否发送 moveend 消息

    /* 初始化/重设地图 */
    function initMap(center = {lat:39.916527,lng:116.397128}, zoom = 17){
        const point = new BMapGL.Point(center.lng, center.lat);
        if(!map){
            map = new BMapGL.Map("map",{enableMapClick:false});
            map.centerAndZoom(point, zoom);
            map.enableScrollWheelZoom(true);
            // 监听拖拽、缩放结束
            map.addEventListener('moveend',   handleMoveEnd);
            map.addEventListener('zoomend',   handleMoveEnd);
        }else{
            map.centerAndZoom(point, zoom);
        }
    }

    /* 地图停止移动/缩放后触发 */
    function handleMoveEnd(){
        const center = map.getCenter();          // BMap.Point
		console.log('----------------<',center);
        const data = {lat:center.lat, lng:center.lng,center:center, type:'moveend'};
        if(isPost === 'yes'){
			
            uni.postMessage({data: JSON.stringify(data)});
        }
        // 节流：100 ms 内不再重复发送
        isPost = 'no';
        setTimeout(()=>{ isPost = 'yes'; },100);
    }

    /* 页面加载完成 → 读 URL 参数并初始化 */
    window.onload = function(){
        const urlParams = new URLSearchParams(location.search);
        // const width = urlParams.get('width') || 375;
        // const width = 500;
		// console.log('09-0-0-=-==',width);
        // document.getElementById('map-container').style.width = width + 'px';

        initMap({
            lat: parseFloat(urlParams.get('lat'))  || 39.916527,
            lng: parseFloat(urlParams.get('lng'))  || 116.397128
        });
    };

    /* 外层 nvue 主动传参接口保持同名兼容 */
    window.receiveFromNvue = function(data){
        try{
            const json = JSON.parse(data);
            console.log('收到 nvue 参数:', json);

            /* 支持一次性关闭消息发送 */
            if(json.type === 'no') isPost = 'no';
            else                   isPost = 'yes';

            /* 重新定位地图 */
            initMap(json.value);
        }catch(e){
            console.error('解析参数失败:', e);
        }
    };
</script>
</body>
</html>
